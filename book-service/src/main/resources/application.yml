spring:
  application:
    name: book-service
  datasource:
    url: jdbc:postgresql://localhost:5433/books_db
    username: admin
    password: secret
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  rabbitmq:
    host: localhost
    port: 5672
  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis
    redis:
      time-to-live: 600000

jwt:
  secret: your-256-bit-secret-key-here-change-this
  expiration: 86400000

server:
  port: 8082